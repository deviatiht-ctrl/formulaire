<!DOCTYPE html>

    <meta charset="UTF-8">

                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="formations.html" class="nav-item active">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Formations</span>
                </a>
                <a href="seminaires.html" class="nav-item">
                    <i class="fas fa-video"></i>
                    <span>Séminaires</span>
                </a>
                <a href="etudiants.html" class="nav-item">
                    <i class="fas fa-users"></i>

                </a>

                    <span>Retour site</span>
                </a>
            </div>
        </aside>
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h1>Formations</h1>
                        <p>Gérez vos formations et cours</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-primary" onclick="openModal()">
                        <i class="fas fa-plus"></i>
                        <span>Nouvelle formation</span>
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="Rechercher..." class="search-input">
                <select id="statusFilter" class="filter-select">
                    <option value="">Tous les statuts</option>
                    <option value="publie">Publié</option>
                    <option value="brouillon">Brouillon</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="">Toutes les catégories</option>
                </select>
            </div>

            <!-- Formations List -->
            <div class="card">
                <div class="card-body">
                    <div class="formations-table-container">
                        <table class="formations-table" id="formationsTable">
                            <thead>
                                <tr>
                                    <th>Formation</th>
                                    <th>Catégorie</th>
                                    <th>Type</th>
                                    <th>Prix</th>
                                    <th>Durée</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="formationsList">
                                <tr><td colspan="7" class="no-data">Chargement...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay hidden" id="formationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nouvelle Formation</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="formationForm" class="modal-body">
                <input type="hidden" id="formationId">
                
                <div class="form-group">
                    <label>Titre *</label>
                    <input type="text" id="titre" required>
                </div>

                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Catégorie *</label>
                        <select id="categorie" required>
                            <option value="">Choisir...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type de formation *</label>
                        <select id="typeFormation" required>
                            <option value="en_ligne">En ligne</option>
                            <option value="presentiel">Présentiel</option>
                            <option value="hybride">Hybride</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Prix (HTG) *</label>
                        <input type="number" id="prix" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Durée *</label>
                        <input type="text" id="duree" placeholder="Ex: 40h, 1 mois, 2 jours" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Couleur</label>
                        <input type="color" id="couleur" value="#2563eb">
                    </div>
                    <div class="form-group">
                        <label>Statut</label>
                        <select id="statut">
                            <option value="brouillon">Brouillon</option>
                            <option value="publie">Publié</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Images de la formation (Plusieurs possibles) *</label>
                    <input type="file" id="imageFiles" accept="image/*" class="form-input" multiple>
                    <div id="imagesPreviewList" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
                        <!-- Preview thumbnails will appear here -->
                    </div>
                    <input type="hidden" id="imagesData" value="[]">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase.js"></script>
    
    <script>
        // Load categories
        async function loadCategories() {
            try {
                const { data, error } = await window.supabaseClient.from('categories').select('*');
                if (error) throw error;
                
                const select = document.getElementById('categorie');
                select.innerHTML = '<option value="">Choisir...</option>';
                if (data) {
                    data.forEach(cat => {
                        select.innerHTML += `<option value="${cat.id}">${cat.nom}</option>`;
                    });
                }
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        // Load formations
        async function loadFormations() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('formations')
                    .select('*, categories(nom)')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('formationsList');
                if (data && data.length > 0) {
                    tbody.innerHTML = data.map(f => `
                        <tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <img src="${f.image_principale || 'https://via.placeholder.com/50'}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                                    <div style="font-weight:600;color:#0f172a;">${f.titre}</div>
                                </div>
                                <div style="font-size:0.85rem;color:#64748b;">${f.description?.substring(0, 50) || ''}...</div>
                            </td>
                            <td>${f.categories?.nom || '-'}</td>
                            <td>${f.type_formation || '-'}</td>
                            <td>${f.prix > 0 ? f.prix + ' HTG' : 'Gratuit'}</td>
                            <td>${f.duree || '-'}</td>
                            <td><span class="status-badge ${f.status}">${f.status || 'brouillon'}</span></td>
                            <td>
                                <button class="action-btn edit" onclick="editFormation('${f.id}')"><i class="fas fa-edit"></i></button>
                                <button class="action-btn delete" onclick="deleteFormation('${f.id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="no-data">Aucune formation</td></tr>';
                }
            } catch (err) {
                console.error('Error loading formations:', err);
            }
        }

        // Modal functions
        function openModal(id = null) {
            document.getElementById('formationModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = id ? 'Modifier Formation' : 'Nouvelle Formation';
            loadCategories();
            
            if (id) {
                // Load formation data for editing
                loadFormationData(id);
            } else {
                // Reset form
                document.getElementById('formationForm').reset();
                document.getElementById('formationId').value = '';
            }
        }

        function closeModal() {
            document.getElementById('formationModal').classList.add('hidden');
        }

        async function loadFormationData(id) {
            try {
                const { data, error } = await window.supabaseClient.from('formations').select('*').eq('id', id).single();
                if (error) throw error;
                
                document.getElementById('formationId').value = data.id;
                document.getElementById('titre').value = data.titre;
                document.getElementById('description').value = data.description || '';
                document.getElementById('categorie').value = data.categorie_id || '';
                document.getElementById('typeFormation').value = data.type_formation || 'en_ligne';
                document.getElementById('prix').value = data.prix || 0;
                document.getElementById('duree').value = data.duree || '';
                document.getElementById('couleur').value = data.couleur || '#2563eb';
                document.getElementById('statut').value = data.status || 'brouillon';
                
                const imagesArr = data.images || (data.image_principale ? [data.image_principale] : []);
                document.getElementById('imagesData').value = JSON.stringify(imagesArr);
                renderImagesPreview(imagesArr);
            } catch (err) {
                console.error('Error loading formation:', err);
            }
        }

        function renderImagesPreview(images) {
            const list = document.getElementById('imagesPreviewList');
            list.innerHTML = images.map((img, index) => `
                <div style="position:relative; width:80px; height:80px;">
                    <img src="${img}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
                    <button type="button" onclick="removeImage(${index})" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:12px;">&times;</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            let images = JSON.parse(document.getElementById('imagesData').value || "[]");
            images.splice(index, 1);
            document.getElementById('imagesData').value = JSON.stringify(images);
            renderImagesPreview(images);
        }

        async function editFormation(id) {
            openModal(id);
        }

        async function deleteFormation(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cette formation ?')) return;
            
            try {
                const { error } = await window.supabaseClient.from('formations').delete().eq('id', id);
                if (error) throw error;
                
                loadFormations();
            } catch (err) {
                console.error('Error deleting formation:', err);
                alert('Erreur lors de la suppression');
            }
        }

        // Handle Multiple Images Preview
        document.getElementById('imageFiles').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                let currentImages = JSON.parse(document.getElementById('imagesData').value || "[]");
                
                for (const file of files) {
                    const url = await uploadImage(file);
                    currentImages.push(url);
                }
                
                document.getElementById('imagesData').value = JSON.stringify(currentImages);
                renderImagesPreview(currentImages);
            } catch (err) {
                alert('Error uploading: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enregistrer';
            }
        });

        async function uploadImage(file) {
            const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
            const { data, error } = await window.supabaseClient.storage
                .from('maillots')
                .upload(fileName, file);
            
            if (error) throw error;
            const { data: { publicUrl } } = window.supabaseClient.storage.from('maillots').getPublicUrl(fileName);
            return publicUrl;
        }

        // Form submission
        document.getElementById('formationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...';

            try {
                const id = document.getElementById('formationId').value;
                const imagesArr = JSON.parse(document.getElementById('imagesData').value || "[]");

                const formData = {
                    titre: document.getElementById('titre').value,
                    description: document.getElementById('description').value,
                    categorie_id: document.getElementById('categorie').value,
                    type_formation: document.getElementById('typeFormation').value,
                    prix: parseFloat(document.getElementById('prix').value),
                    duree: document.getElementById('duree').value,
                    couleur: document.getElementById('couleur').value,
                    status: document.getElementById('statut').value,
                    image_principale: imagesArr[0] || '', // First image as main
                    images: imagesArr
                };

                let error;
                if (id) {
                    const { error: updateError } = await window.supabaseClient.from('formations').update(formData).eq('id', id);
                    error = updateError;
                } else {
                    const { error: insertError } = await window.supabaseClient.from('formations').insert([formData]);
                    error = insertError;
                }

                if (error) throw error;

                closeModal();
                loadFormations();
                alert('Formation enregistrée avec succès !');
            } catch (err) {
                console.error('Error saving formation:', err);
                alert('Erreur: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enregistrer';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFormations();
        });

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }
        window.toggleSidebar = toggleSidebar;
    </script>
