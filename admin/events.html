    <!-- Modal -->
    <div class="modal-overlay hidden" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nouvel Événement</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="eventForm" class="modal-body">
                <input type="hidden" id="eventId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Titre *</label>
                        <input type="text" id="titre" required class="search-input">
                    </div>
                    <div class="form-group">
                        <label>Type d'événement *</label>
                        <select id="typeEvenement" class="filter-select" required>
                            <option value="in_person">En personne</option>
                            <option value="online">En ligne</option>
                            <option value="hybrid">Hybride</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4" class="search-input"></textarea>
                </div>

                <div class="form-group">
                    <label>Flyer de l'événement</label>
                    <div class="file-upload">
                        <input type="file" id="flyerFile" accept="image/*" onchange="handleFileUpload(event)">
                        <label for="flyerFile" class="file-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Choisir une image</span>
                        </label>
                        <div id="flyerPreview" class="flyer-preview"></div>
                        <input type="hidden" id="flyerUrl">
                        <input type="hidden" id="flyerPublicId">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date de l'événement *</label>
                        <input type="datetime-local" id="dateEvenement" required class="search-input">
                    </div>
                    <div class="form-group">
                        <label>Lieu</label>
                        <input type="text" id="lieu" class="search-input" placeholder="Adresse ou lien Zoom">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Payant ?</label>
                        <select id="estPayant" class="filter-select" onchange="togglePriceField()">
                            <option value="false">Gratuit</option>
                            <option value="true">Payant</option>
                        </select>
                    </div>
                    <div class="form-group" id="priceGroup" style="display: none;">
                        <label>Prix (HTG)</label>
                        <input type="number" id="prix" min="0" step="0.01" class="search-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>Sponsors (un par ligne)</label>
                    <textarea id="sponsors" rows="3" class="search-input" placeholder="Sponsor 1&#10;Sponsor 2&#10;Sponsor 3"></textarea>
                </div>

                <div class="form-group">
                    <label>Lien Groupe WhatsApp (Invitation)</label>
                    <input type="url" id="whatsappLink" class="search-input" placeholder="https://chat.whatsapp.com/...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Statut</label>
                        <select id="status" class="filter-select">
                            <option value="actif">Actif</option>
                            <option value="brouillon">Brouillon</option>
                            <option value="archive">Archivé</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Afficher sur le site</label>
                        <select id="afficherSurSite" class="filter-select">
                            <option value="true">Oui</option>
                            <option value="false">Non</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Inscription ouverte ?</label>
                        <select id="inscriptionOuverte" class="filter-select">
                            <option value="true">Oui - Accepter inscriptions</option>
                            <option value="false">Non - Inscriptions fermées</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Places max (vide = illimité)</label>
                        <input type="number" id="placesMax" min="1" class="search-input" placeholder="Ex: 50">
                    </div>
                    <div class="form-group">
                        <label>Activer Quiz ?</label>
                        <select id="hasQuiz" class="filter-select">
                            <option value="false">Non</option>
                            <option value="true">Oui (Questions sur Haïti)</option>
                        </select>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>

    <script>
        let currentAdmin = null;
        let allEvents = [];

        // Check admin authentication
        function checkAuth() {
            const adminData = sessionStorage.getItem('admin');
            if (!adminData) {
                window.location.href = '../espace-etudiant/login.html';
                return false;
            }
            currentAdmin = JSON.parse(adminData);
            return true;
        }

        // Load events
        async function loadEvents() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('events')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                allEvents = data || [];
                filterAndDisplayEvents();
                // Load counts after display
                setTimeout(() => loadRegistrationCounts(allEvents), 300);
            } catch (err) {
                console.error('Error loading events:', err);
                document.getElementById('eventsList').innerHTML = '<div class="no-data">Erreur de chargement</div>';
            }
        }

        // Filter and display events
        function filterAndDisplayEvents() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            let filtered = allEvents.filter(event => {
                if (search && !event.titre.toLowerCase().includes(search)) return false;
                if (statusFilter && event.status !== statusFilter) return false;
                if (typeFilter && event.type_evenement !== typeFilter) return false;
                return true;
            });

            displayEvents(filtered);
        }

        // Display events
        function displayEvents(events) {
            const container = document.getElementById('eventsList');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="no-data">Aucun événement trouvé</div>';
                return;
            }

            container.innerHTML = events.map(event => {
                const date = event.date_evenement ? new Date(event.date_evenement).toLocaleDateString('fr-FR', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                }) : 'Date non définie';

                const price = event.est_payant ? `${event.prix} ${event.devise}` : 'Gratuit';
                const priceClass = event.est_payant ? '' : 'free';

                return `
                    <div class="event-card">
                        ${event.flyer_url ? `<img src="${event.flyer_url}" alt="${event.titre}" class="event-flyer" onclick="viewFlyer('${event.flyer_url}')">` : ''}
                        <div class="event-details">
                            <h3 class="event-title">${event.titre}</h3>
                            <span class="event-status status-${event.status}">${event.status}</span>
                            <div class="event-meta">
                                <i class="fas fa-calendar"></i> ${date}
                            </div>
                            <div class="event-meta">
                                <i class="fas fa-map-marker-alt"></i> ${event.lieu || 'Lieu non défini'}
                            </div>
                            <div class="event-meta">
                                <i class="fas fa-${event.type_evenement === 'online' ? 'video' : event.type_evenement === 'hybrid' ? 'laptop' : 'users'}"></i>
                                ${event.type_evenement === 'online' ? 'En ligne' : event.type_evenement === 'hybrid' ? 'Hybride' : 'En personne'}
                            </div>
                            <div class="event-price ${priceClass}">${price}</div>
                            <div class="event-registrations">
                                <span class="reg-count" id="reg-${event.id}">⏳ chargement...</span>
                            </div>
                            <div class="event-actions">
                                <button class="btn-action btn-inscriptions" onclick="location.href='inscriptions-evenements.html?event='+event.id">
                                    <i class="fas fa-users"></i> Inscrits
                                </button>
                                <button class="btn-action btn-edit" onclick="editEvent('${event.id}')">
                                    <i class="fas fa-edit"></i> Modifier
                                </button>
                                <button class="btn-action btn-delete" onclick="deleteEvent('${event.id}')">
                                    <i class="fas fa-trash"></i> Supprimer
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // View flyer
        function viewFlyer(url) {
            window.open(url, '_blank');
        }

        // Load registration counts
        async function loadRegistrationCounts(events) {
            for (const event of events) {
                try {
                    const { count } = await window.supabaseClient
                        .from('inscriptions_evenements')
                        .select('*', { count: 'exact', head: true })
                        .eq('event_id', event.id);
                    const el = document.getElementById(`reg-${event.id}`);
                    if (el) el.textContent = `👥 ${count || 0} inscrit(s)`;
                } catch (_) {}
            }
        }

        // Open modal
        function openModal(eventId = null) {
            document.getElementById('eventModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = eventId ? 'Modifier Événement' : 'Nouvel Événement';
            
            if (eventId) {
                const event = allEvents.find(e => e.id === eventId);
                if (event) {
                    document.getElementById('eventId').value = event.id;
                    document.getElementById('titre').value = event.titre;
                    document.getElementById('description').value = event.description || '';
                    document.getElementById('typeEvenement').value = event.type_evenement;
                    document.getElementById('dateEvenement').value = event.date_evenement
                        ? event.date_evenement.slice(0, 16) : '';
                    document.getElementById('lieu').value = event.lieu || '';
                    document.getElementById('estPayant').value = String(event.est_payant);
                    document.getElementById('prix').value = event.prix || 0;
                    document.getElementById('sponsors').value = (event.sponsors || []).join('\n');
                    document.getElementById('status').value = event.status;
                    document.getElementById('afficherSurSite').value = String(event.afficher_sur_site);
                    document.getElementById('inscriptionOuverte').value = String(event.inscription_ouverte !== false);
                    document.getElementById('placesMax').value = event.places_max || '';
                    document.getElementById('flyerUrl').value = event.flyer_url || '';
                    document.getElementById('whatsappLink').value = event.whatsapp_link || '';
                    document.getElementById('hasQuiz').value = String(event.has_quiz === true);
                    document.getElementById('flyerPublicId').value = event.flyer_public_id || '';
                    togglePriceField();
                    if (event.flyer_url) {
                        document.getElementById('flyerPreview').innerHTML = `<img src="${event.flyer_url}" alt="Flyer">`;
                        document.getElementById('flyerPreview').classList.add('show');
                    }
                }
            } else {
                document.getElementById('eventForm').reset();
                document.getElementById('eventId').value = '';
                document.getElementById('flyerPreview').innerHTML = '';
                document.getElementById('flyerPreview').classList.remove('show');
                document.getElementById('flyerUrl').value = '';
                document.getElementById('flyerPublicId').value = '';
                document.getElementById('whatsappLink').value = '';
                document.getElementById('hasQuiz').value = 'false';
                document.getElementById('inscriptionOuverte').value = 'true';
                togglePriceField();
            }
        }

        // View inscriptions
        async function viewInscriptions(eventId, titre) {
            document.getElementById('inscriptionsModalTitle').textContent = `Inscrits — ${titre}`;
            document.getElementById('inscriptionsModalBody').innerHTML = '<p style="color:#94a3b8;">Chargement...</p>';
            document.getElementById('inscriptionsModal').classList.remove('hidden');

            try {
                const { data, error } = await window.supabaseClient
                    .from('inscriptions_evenements')
                    .select('*')
                    .eq('event_id', eventId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('inscriptionsModalBody').innerHTML =
                        '<p style="color:#94a3b8;text-align:center;padding:2rem;">Aucune inscription pour cet événement</p>';
                    return;
                }

                document.getElementById('inscriptionsModalBody').innerHTML = `
                    <p style="margin-bottom:1rem;font-size:0.9rem;color:#475569;">
                        <strong>${data.length}</strong> inscription(s) au total
                    </p>
                    <div style="overflow-x:auto;">
                    <table class="ins-table">
                        <thead>
                            <tr>
                                <th>Nom & Prénom</th>
                                <th>Email</th>
                                <th>Téléphone</th>
                                <th>Ville</th>
                                <th>Statut</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(ins => `
                                <tr>
                                    <td><strong>${ins.prenom} ${ins.nom}</strong></td>
                                    <td>${ins.email}</td>
                                    <td>${ins.telephone || '-'}</td>
                                    <td>${ins.ville || '-'}</td>
                                    <td>
                                        <span class="badge-${ins.statut}">${ins.statut}</span>
                                    </td>
                                    <td>${new Date(ins.created_at).toLocaleDateString('fr-FR')}</td>
                                    <td>
                                        <button onclick="confirmInscription('${ins.id}')" style="padding:0.3rem 0.6rem;background:#10b981;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.75rem;">✓</button>
                                        <button onclick="cancelInscription('${ins.id}')" style="padding:0.3rem 0.6rem;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.75rem;">✕</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                document.getElementById('inscriptionsModalBody').innerHTML =
                    '<p style="color:#ef4444;">Erreur de chargement</p>';
            }
        }

        async function confirmInscription(id) {
            await window.supabaseClient.from('inscriptions_evenements').update({ statut: 'confirme' }).eq('id', id);
            document.querySelector(`[onclick="confirmInscription('${id}')"]`).closest('tr').querySelector('.badge-en_attente, .badge-annule').outerHTML = '<span class="badge-confirme">confirme</span>';
        }

        async function cancelInscription(id) {
            await window.supabaseClient.from('inscriptions_evenements').update({ statut: 'annule' }).eq('id', id);
        }

        function closeInscriptionsModal() {
            document.getElementById('inscriptionsModal').classList.add('hidden');
        }

        // Close modal
        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }

        // Toggle price field
        function togglePriceField() {
            const isPayant = document.getElementById('estPayant').value === 'true';
            document.getElementById('priceGroup').style.display = isPayant ? 'block' : 'none';
        }

        // Handle file upload
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { data, error } = await window.supabaseClient.storage
                    .from('events')
                    .upload(fileName, file);

                if (error) throw error;

                const { data: { publicUrl } } = window.supabaseClient.storage
                    .from('events')
                    .getPublicUrl(fileName);

                document.getElementById('flyerUrl').value = publicUrl;
                document.getElementById('flyerPublicId').value = fileName;
                document.getElementById('flyerPreview').innerHTML = `<img src="${publicUrl}" alt="Flyer">`;
                document.getElementById('flyerPreview').classList.add('show');
            } catch (err) {
                console.error('Error uploading file:', err);
                alert('Erreur lors du téléchargement de l\'image');
            }
        }

        // Edit event
        function editEvent(eventId) {
            openModal(eventId);
        }

        // Delete event
        async function deleteEvent(eventId) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cet événement ?')) return;

            try {
                const { error } = await window.supabaseClient
                    .from('events')
                    .delete()
                    .eq('id', eventId);

                if (error) throw error;
                
                await loadEvents();
            } catch (err) {
                console.error('Error deleting event:', err);
                alert('Erreur lors de la suppression');
            }
        }

        // Form submit
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const eventId = document.getElementById('eventId').value;
            const eventData = {
                titre: document.getElementById('titre').value,
                description: document.getElementById('description').value,
                type_evenement: document.getElementById('typeEvenement').value,
                date_evenement: document.getElementById('dateEvenement').value || null,
                lieu: document.getElementById('lieu').value,
                est_payant: document.getElementById('estPayant').value === 'true',
                prix: parseFloat(document.getElementById('prix').value) || 0,
                sponsors: document.getElementById('sponsors').value.split('\n').filter(s => s.trim()),
                status: document.getElementById('status').value,
                afficher_sur_site: document.getElementById('afficherSurSite').value === 'true',
                inscription_ouverte: document.getElementById('inscriptionOuverte').value === 'true',
                places_max: parseInt(document.getElementById('placesMax').value) || null,
                whatsapp_link: document.getElementById('whatsappLink').value || null,
                has_quiz: document.getElementById('hasQuiz').value === 'true',
                flyer_url: document.getElementById('flyerUrl').value || null,
                flyer_public_id: document.getElementById('flyerPublicId').value || null
            };

            try {
                if (eventId) {
                    const { error } = await window.supabaseClient
                        .from('events')
                        .update(eventData)
                        .eq('id', eventId);
                    if (error) throw error;
                } else {
                    const { error } = await window.supabaseClient
                        .from('events')
                        .insert([eventData]);
                    if (error) throw error;
                }

                closeModal();
                await loadEvents();
            } catch (err) {
                console.error('Error saving event:', err);
                alert('Erreur lors de l\'enregistrement');
            }
        });

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterAndDisplayEvents);
        document.getElementById('statusFilter').addEventListener('change', filterAndDisplayEvents);
        document.getElementById('typeFilter').addEventListener('change', filterAndDisplayEvents);
        document.querySelector('.logout-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.clear();
            window.location.href = '../espace-etudiant/login.html';
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadEvents();
            }
        });
    </script>
</body>
</html>
