<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gérer la Galerie - Admin | Rasin Ayiti</title>
    
    <link rel="icon" href="../assets/logorasin.PNG" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/logorasin.PNG" alt="Rasin Ayiti" class="sidebar-logo">
                <div>
                    <span class="sidebar-title">Rasin Ayiti</span>
                    <span class="sidebar-subtitle">Administration</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="formations.html" class="nav-item">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Formations</span>
                </a>
                <a href="seminaires.html" class="nav-item">
                    <i class="fas fa-video"></i>
                    <span>Séminaires</span>
                </a>
                <a href="etudiants.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Étudiants</span>
                </a>
                <a href="galerie.html" class="nav-item active">
                    <i class="fas fa-images"></i>
                    <span>Galerie</span>
                </a>
                <a href="parametres.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="logout-btn">
                    <i class="fas fa-home"></i>
                    <span>Retour site</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>Galerie</h1>
                    <p>Gérez vos photos et vidéos</p>
                </div>
                <div class="header-right">
                    <button class="btn-primary" onclick="openModal()">
                        <i class="fas fa-plus"></i>
                        <span>Ajouter un média</span>
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="Rechercher..." class="search-input">
                <select id="typeFilter" class="filter-select">
                    <option value="">Tous les types</option>
                    <option value="image">Images</option>
                    <option value="video">Vidéos</option>
                </select>
                <select id="statusFilter" class="filter-select">
                    <option value="">Tous</option>
                    <option value="true">Publié</option>
                    <option value="false">Brouillon</option>
                </select>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <div class="gallery-item skeleton">
                    <div class="skeleton-bg"></div>
                </div>
                <div class="gallery-item skeleton">
                    <div class="skeleton-bg"></div>
                </div>
                <div class="gallery-item skeleton">
                    <div class="skeleton-bg"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay hidden" id="galleryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ajouter un média</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="galleryForm" class="modal-body">
                <input type="hidden" id="mediaId">
                
                <div class="form-group">
                    <label>Titre *</label>
                    <input type="text" id="titre" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Type de média *</label>
                    <select id="typeMedia" required>
                        <option value="image">Image</option>
                        <option value="video">Vidéo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>URL du fichier *</label>
                    <input type="url" id="urlFichier" placeholder="https://..." required>
                </div>

                <div class="form-group">
                    <label>Statut</label>
                    <select id="statut">
                        <option value="true">Publié</option>
                        <option value="false">Brouillon</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .admin-dashboard {
            display: flex;
            min-height: 100vh;
            background: #f1f5f9;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
        }

        .sidebar-title {
            display: block;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .sidebar-subtitle {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .dashboard-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .dashboard-header p {
            color: #64748b;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.75rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .filters-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-input,
        .filter-select {
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .search-input {
            flex: 1;
            max-width: 300px;
        }

        .filter-select {
            min-width: 150px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .gallery-item-content {
            padding: 1rem;
        }

        .gallery-item-title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .gallery-item-type {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gallery-item-actions {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .gallery-item-actions {
            opacity: 1;
        }

        .gallery-action-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .gallery-action-btn.edit {
            color: #1d4ed8;
        }

        .gallery-action-btn.delete {
            color: #dc2626;
        }

        .skeleton {
            background: #f1f5f9;
            border-radius: 16px;
            overflow: hidden;
        }

        .skeleton-bg {
            width: 100%;
            height: 200px;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s infinite;
        }

        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 100;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase.js"></script>
    
    <script>
        // Load gallery
        async function loadGallery() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('galerie')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('galleryGrid');
                if (data && data.length > 0) {
                    container.innerHTML = data.map(g => `
                        <div class="gallery-item">
                            ${g.type_media === 'image' 
                                ? `<img src="${g.url_fichier}" alt="${g.titre}">` 
                                : `<video src="${g.url_fichier}" controls></video>`
                            }
                            <div class="gallery-item-actions">
                                <button class="gallery-action-btn edit" onclick="editMedia('${g.id}')">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="gallery-action-btn delete" onclick="deleteMedia('${g.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div class="gallery-item-content">
                                <div class="gallery-item-title">${g.titre}</div>
                                <div class="gallery-item-type">
                                    <i class="fas ${g.type_media === 'image' ? 'fa-image' : 'fa-video'}"></i>
                                    <span>${g.type_media === 'image' ? 'Image' : 'Vidéo'}</span>
                                    ${g.publie ? '<span style="color:#10b981;margin-left:0.5rem;">• Publié</span>' : '<span style="color:#f59e0b;margin-left:0.5rem;">• Brouillon</span>'}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:3rem;">Aucun média dans la galerie</p>';
                }
            } catch (err) {
                console.error('Error loading gallery:', err);
            }
        }

        // Modal functions
        function openModal(id = null) {
            document.getElementById('galleryModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = id ? 'Modifier le média' : 'Ajouter un média';
            
            if (id) {
                loadMediaData(id);
            } else {
                document.getElementById('galleryForm').reset();
                document.getElementById('mediaId').value = '';
            }
        }

        function closeModal() {
            document.getElementById('galleryModal').classList.add('hidden');
        }

        async function loadMediaData(id) {
            try {
                const { data, error } = await window.supabaseClient.from('galerie').select('*').eq('id', id).single();
                if (error) throw error;
                
                document.getElementById('mediaId').value = data.id;
                document.getElementById('titre').value = data.titre;
                document.getElementById('description').value = data.description || '';
                document.getElementById('typeMedia').value = data.type_media;
                document.getElementById('urlFichier').value = data.url_fichier;
                document.getElementById('statut').value = data.publie.toString();
            } catch (err) {
                console.error('Error loading media:', err);
            }
        }

        async function editMedia(id) {
            openModal(id);
        }

        async function deleteMedia(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce média ?')) return;
            
            try {
                const { error } = await window.supabaseClient.from('galerie').delete().eq('id', id);
                if (error) throw error;
                
                loadGallery();
            } catch (err) {
                console.error('Error deleting media:', err);
                alert('Erreur lors de la suppression');
            }
        }

        // Form submission
        document.getElementById('galleryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('mediaId').value;
            const formData = {
                titre: document.getElementById('titre').value,
                description: document.getElementById('description').value,
                type_media: document.getElementById('typeMedia').value,
                url_fichier: document.getElementById('urlFichier').value,
                publie: document.getElementById('statut').value === 'true'
            };

            try {
                let error;
                if (id) {
                    const { error: updateError } = await window.supabaseClient.from('galerie').update(formData).eq('id', id);
                    error = updateError;
                } else {
                    const { error: insertError } = await window.supabaseClient.from('galerie').insert([formData]);
                    error = insertError;
                }

                if (error) throw error;

                closeModal();
                loadGallery();
            } catch (err) {
                console.error('Error saving media:', err);
                alert('Erreur lors de l\'enregistrement');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadGallery();
        });
    </script>
</body>
</html>
