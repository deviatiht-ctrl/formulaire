<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donateurs - EventJeunes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .donation-page {
            max-width: 800px;
        }
        
        .donation-hero {
            text-align: center;
            padding: 48px 32px;
            background: linear-gradient(135deg, #fdf2f8 0%, #fff 100%);
            border: 1px solid #fbcfe8;
            border-radius: var(--radius-xl);
            margin-bottom: 32px;
        }
        
        .donation-hero i {
            font-size: 64px;
            color: #ec4899;
            margin-bottom: 20px;
        }
        
        .donation-hero h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        
        .donation-hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 24px;
        }
        
        .total-donations {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 16px 32px;
            border-radius: var(--radius-lg);
            border: 2px solid #ec4899;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.1);
        }
        
        .total-donations .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .total-donations .amount {
            font-size: 1.75rem;
            font-weight: 700;
            color: #ec4899;
        }
        
        .donors-section {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
        }
        
        .donors-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .donors-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .donors-header h2 i {
            color: #ec4899;
        }
        
        .donor-tabs {
            display: flex;
            gap: 8px;
        }
        
        .donor-tab {
            padding: 8px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
        }
        
        .donor-tab:hover {
            border-color: #ec4899;
            color: #ec4899;
        }
        
        .donor-tab.active {
            background: #ec4899;
            border-color: #ec4899;
            color: white;
        }
        
        .donors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .donor-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all var(--transition-fast);
        }
        
        .donor-card:hover {
            border-color: #ec4899;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.1);
        }
        
        .donor-card.anonymous {
            background: #f8fafc;
        }
        
        .donor-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .donor-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ec4899, #f472b6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .donor-card.anonymous .donor-avatar {
            background: #94a3b8;
        }
        
        .donor-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        
        .donor-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .donor-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ec4899;
            margin-top: 12px;
        }
        
        .donor-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .empty-donors {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }
        
        .empty-donors i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
            margin-bottom: 24px;
        }
        
        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        @media (max-width: 640px) {
            .donation-hero {
                padding: 32px 20px;
            }
            
            .donation-hero h1 {
                font-size: 1.5rem;
            }
            
            .donors-grid {
                grid-template-columns: 1fr;
            }
            
            .donor-tabs {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <main class="container donation-page">
        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i>
            Retour à l'accueil
        </a>

        <div class="donation-hero">
            <i class="fas fa-heart"></i>
            <h1>Nos Généreux Donateurs</h1>
            <p>Merci à tous ceux qui contribuent à la réussite de EventJeunes 2026. Votre soutien fait la différence !</p>
            
            <div class="total-donations">
                <span class="label">Total des dons:</span>
                <span class="amount" id="totalAmount">0 Gds</span>
            </div>
        </div>

        <div class="donors-section">
            <div class="donors-header">
                <h2>
                    <i class="fas fa-users"></i>
                    Liste des donateurs
                </h2>
                <div class="donor-tabs">
                    <button class="donor-tab active" onclick="filterDonors('all')">Tous</button>
                    <button class="donor-tab" onclick="filterDonors('named')">Nommés</button>
                    <button class="donor-tab" onclick="filterDonors('anonymous')">Anonymes</button>
                </div>
            </div>
            
            <div class="donors-grid" id="donorsGrid">
                <!-- Donateurs injectés par JS -->
            </div>
            
            <div class="empty-donors hidden" id="emptyDonors">
                <i class="fas fa-inbox"></i>
                <p>Aucun donateur pour le moment</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 32px;">
            <button class="btn-donate btn-donate-primary" onclick="window.location.href='index.html#donationSection'" style="font-size: 1.1rem; padding: 16px 32px;">
                <i class="fas fa-gift"></i>
                Je veux faire un don aussi
            </button>
        </div>

        <footer class="footer">
            <p>© 2026 EventJeunes - Tous droits réservés</p>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=2"></script>
    <script src="donation.js?v=2"></script>
</body>
</html>
